name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      # Changed to assembleRelease and added -P to target specific ABI if supported by your build script
      - name: Build Project with gradle
        run: ./gradlew assembleRelease -Pandroid.bundle.enableUncompressedNativeLibs=false

      - name: Run Local Tests
        run: ./gradlew test

      - name: Lint Checks
        run: ./gradlew ktlintCheck

      # Filtered to only upload the armeabi-v7a release artifact
      - name: Upload artifact nextplayer-armeabi-v7a-release.apk
        uses: actions/upload-artifact@v6
        with:
          name: nextplayer-armeabi-v7a-release.apk
          # Note: The 'unsigned' suffix is added by Gradle when no signing config is provided
          path: ./app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-reports
          path: app/build/reports
